<!DOCTYPE html>
<html lang="en" style="background-color:#0a0e14">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LightSlice" />
  <meta
    name="description"
    content="Camera spectral band filter — slide a visible band and see only that slice of light, placed on the full EM spectrum."
  />
  <title>LightSlice</title>
  <script>
    /* iOS A2HS: lock fill height before first paint (Bottom:full bleed cheat sheet).
       Phone: screen.height > inner → use screen.
       iPad: screen.* often undershoots inner → add safe-area extra. */
    (function () {
      var n = window.navigator;
      var standalone =
        n.standalone === true ||
        window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches;
      if (!standalone) return;
      var root = document.documentElement;
      root.classList.add("pwa-standalone");
      var iw = window.innerWidth || 0;
      var ih = window.innerHeight || 0;
      var sw = window.screen.width || 0;
      var sh = window.screen.height || 0;
      var screenMax = Math.max(sw, sh);
      var screenMin = Math.min(sw, sh);
      var fillH = ih >= iw ? Math.max(ih, screenMax) : Math.max(ih, screenMin);
      var extra = 0;
      if (Math.min(iw, ih) >= 600 && screenMax < ih - 10) {
        extra = 20;
      }
      root.style.setProperty("--pwa-fill-h", fillH + "px");
      root.style.setProperty("--pwa-extra-b", extra + "px");
    })();
  </script>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Michroma&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #121a24;
      --surface-2: #1a2533;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-glow: rgba(61, 156, 245, 0.22);
      --scrub: #facc15;
      --live: #4ade80;
      --danger: #f87171;
      --border: rgba(255, 255, 255, 0.08);
      --app-gap: clamp(0.3rem, 1vmin, 0.5rem);
      --text-title: clamp(1.05rem, 3.2vmin, 1.35rem);
      --text-ui: clamp(0.62rem, 1.55vmin, 0.72rem);
      --text-value: clamp(0.85rem, 2.2vmin, 1.05rem);
      --text-label: clamp(0.55rem, 1.35vmin, 0.65rem);
      /* Extra under bottom card: negative lowers, positive raises (phone PWA / iPad) */
      --dock-lift: 0px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      height: 100%;
      min-height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
    }

    /* Desktop card: safe-area on stage. Fluid phone/tablet overrides below. */
    .fit-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding:
        max(0.2rem, env(safe-area-inset-top))
        max(0.35rem, env(safe-area-inset-right))
        max(0.2rem, env(safe-area-inset-bottom))
        max(0.35rem, env(safe-area-inset-left));
    }

    /* Home-screen PWA: lock to screen height (Bug B — env() overshoot alone fails). */
    html.pwa-standalone,
    html.pwa-standalone body {
      height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
      min-height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
    }

    html.pwa-standalone .fit-stage,
    html.pwa-standalone .fit-stage.fit-stage--fluid {
      top: 0;
      right: 0;
      bottom: auto;
      left: 0;
      width: 100%;
      height: calc(var(--pwa-fill-h, 100%) + var(--pwa-extra-b, 0px));
    }

    .fit-stage.fit-stage--fluid {
      align-items: stretch;
      justify-content: stretch;
    }

    .fit-stage.fit-stage--fluid .app {
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
    }

    .app {
      position: relative;
      flex-shrink: 0;
      box-sizing: border-box;
      width: 720px;
      height: min(920px, 100%);
      max-height: 100%;
      padding: 0.45rem 0.5rem 0.5rem;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto auto;
      gap: var(--app-gap);
      transform: scale(1);
      transform-origin: center center;
      will-change: transform;
      background: radial-gradient(120% 80% at 50% 0%, #121a28 0%, var(--bg) 55%);
      border-radius: 14px;
    }

    .app:not(.is-fitted) {
      opacity: 0;
    }
    .app.is-fitted {
      opacity: 1;
      transition: opacity 0.12s ease;
    }

    header.top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 2.1rem;
      transform: translateY(-3px);
    }

    .brand h1 {
      font-family: "Michroma", "IBM Plex Sans", system-ui, sans-serif;
      font-size: var(--text-title);
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.1;
      text-align: center;
      text-transform: none;
    }

    .readouts {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.35rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.35rem 0.55rem;
      min-width: 0;
    }

    .stat-label {
      font-size: var(--text-label);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: var(--text-value);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-value.swatch {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .swatch-chip {
      width: 0.85rem;
      height: 0.85rem;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
      background: #888;
    }

    .preview-wrap {
      position: relative;
      min-height: 0;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    .preview-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .preview-wrap video.mirror {
      transform: scaleX(-1);
    }

    .preview-wrap #view {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: #000;
      z-index: 2;
      opacity: 1;
    }

    .spectrum-block {
      display: grid;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .spectrum-row {
      display: grid;
      gap: 0.15rem;
    }

    .spectrum-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: var(--text-label);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 0.1rem;
    }

    .spectrum-label strong {
      color: var(--text);
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
      font-size: var(--text-ui);
    }

    .spectrum-track {
      position: relative;
      height: 1.55rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #060a10;
    }

    .spectrum-track.em {
      height: 1.85rem;
    }

    .spectrum-track.vis {
      height: 2.35rem;
      touch-action: none;
      cursor: ew-resize;
    }

    .spectrum-track canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    #vis-hit {
      position: absolute;
      inset: 0;
      z-index: 2;
      touch-action: none;
      cursor: ew-resize;
    }

    .hint {
      font-size: var(--text-ui);
      color: var(--muted);
      text-align: center;
      line-height: 1.35;
      min-height: 1.35em;
      padding: 0 0.25rem;
    }

    .hint .hint-white {
      color: var(--scrub);
      font-weight: inherit;
    }

    .controls {
      display: grid;
      gap: 0.4rem;
      padding: 0.45rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      font-size: var(--text-ui);
      font-weight: 600;
      padding: 0.45rem 0.7rem;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn:not(:disabled):active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      border-color: transparent;
      color: #061018;
      box-shadow: 0 0 0 1px rgba(61, 156, 245, 0.3), 0 0 18px var(--accent-glow);
    }

    .btn-primary[data-state="on"] {
      background: #243044;
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.35);
      box-shadow: none;
    }

    .btn:not(.btn-primary)[data-on="1"],
    .btn:not(.btn-primary)[aria-pressed="true"] {
      background: rgba(61, 156, 245, 0.22);
      border-color: rgba(61, 156, 245, 0.6);
      color: #9ec9f8;
      box-shadow: 0 0 0 1px rgba(61, 156, 245, 0.25), 0 0 14px var(--accent-glow);
    }

    .row.modes-presets {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem 0.5rem;
    }

    /* Top row: Stop / Flip / Full | ROYGBIV — keep on one line */
    .row.primary-row {
      flex-wrap: nowrap;
      gap: 0.25rem 0.35rem;
    }

    .row.modes-presets .modes,
    .row.modes-presets .presets {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.3rem;
    }

    .row.primary-row .modes,
    .row.primary-row .presets {
      flex-wrap: nowrap;
      flex-shrink: 0;
    }

    .row.primary-row .presets {
      margin-left: auto;
      gap: 0.15rem;
    }

    .row.primary-row .presets .btn-ghost {
      padding: 0.35rem 0.42rem;
      min-width: 1.65em;
    }

    .row.modes-presets .presets {
      margin-left: auto;
    }

    /* Animals sit on the former ROYGBIV wrap line (row 2) */
    .row.vision-row {
      justify-content: flex-end;
      padding-top: 0.05rem;
    }

    .row.vision-row .presets {
      margin-left: 0;
    }

    /* Colorblind types (bottom row) — equal-width full names */
    .row.slot-row {
      justify-content: stretch;
      padding-top: 0.05rem;
    }

    .row.slot-row .presets {
      margin-left: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.3rem;
      width: 100%;
    }

    .row.slot-row .presets .btn {
      width: 100%;
      min-width: 0;
      padding-left: 0.25rem;
      padding-right: 0.25rem;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-ghost {
      background: transparent;
      font-weight: 500;
      padding: 0.35rem 0.55rem;
      color: var(--muted);
    }

    .btn-ghost:not(:disabled):hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .controls.is-idle .btn:not(.btn-primary) {
      pointer-events: none;
    }

    .controls.is-idle .btn:not(.btn-primary)[data-on="1"],
    .controls.is-idle .btn:not(.btn-primary)[aria-pressed="true"] {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
      box-shadow: none;
    }

    /* Band strip stays usable while idle so user can set band before Start */
    .spectrum-track.vis {
      pointer-events: auto;
    }

    /*
     * Full-bleed fluid layout: phones + tablets (iPad, etc.).
     * Stage paints edge-to-edge (no top/bottom pad → no grey notch strip).
     * Safe-area lives on header (top) + controls (bottom). Preview flexes.
     * Mac/PC with fine pointer + hover keep the centered 720 card above.
     */
    @media (max-width: 767px),
      ((max-width: 1366px) and (hover: none)),
      ((max-width: 1366px) and (pointer: coarse)) {
      .fit-stage,
      .fit-stage.fit-stage--fluid {
        position: fixed;
        inset: 0;
        align-items: stretch;
        justify-content: stretch;
        /* Prefer edge stretch — do NOT use max-height:100dvh (undershoots iOS). */
        width: auto;
        height: auto;
        padding: 0;
        background: var(--bg);
      }

      .app {
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
        border-radius: 0;
        /* Safe-area OUTSIDE the bottom card so rounded corners stay on-screen.
           --dock-lift: phone PWA −10px, iPad +10px (see rules below). */
        padding: 0 max(0.3rem, env(safe-area-inset-right, 0px))
          max(0px, calc(max(0.22rem, env(safe-area-inset-bottom, 0px)) + var(--dock-lift, 0px)))
          max(0.3rem, env(safe-area-inset-left, 0px));
        gap: 0.25rem;
        display: flex;
        flex-direction: column;
        transform: none !important;
        will-change: auto;
        background: radial-gradient(120% 80% at 50% 0%, #121a28 0%, var(--bg) 55%);
      }

      /* Notch: pad content, keep app paint under status bar / island */
      .app > header.top {
        flex: 0 0 auto;
        padding-top: max(0.28rem, env(safe-area-inset-top, 0px));
        min-height: 0;
      }

      .app > .readouts,
      .app > .spectrum-block,
      .app > .hint {
        flex: 0 0 auto;
      }

      /* Camera grows into leftover space above the docked bottom card */
      .app > .preview-wrap {
        flex: 1 1 auto;
        min-height: 0;
      }

      /* Full rounded card sits above home-indicator inset (not flush-clipped) */
      .app > .controls {
        flex: 0 0 auto;
        margin-top: 0;
        border-radius: 12px;
        padding: 0.36rem;
      }

      .row.primary-row .modes {
        gap: 0.2rem;
      }

      .row.primary-row .modes .btn {
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }

      .hint {
        min-height: 1.1em;
        margin: 0;
      }
    }

    /* Phone PWA: lower card 10px. iPad/tablet: raise 10px (corners were just off). */
    @media (max-width: 767px) {
      html.pwa-standalone {
        --dock-lift: -10px;
      }
    }

    @media (min-width: 768px) and (max-width: 1366px) and (hover: none),
      (min-width: 768px) and (max-width: 1366px) and (pointer: coarse) {
      :root,
      html.pwa-standalone {
        --dock-lift: 10px;
      }
    }

    /*
     * Phone landscape: camera on notch side, chrome opposite.
     * CRITICAL: chrome must NOT use env(safe-area-inset-left/right) — when the
     * phone is flipped those values are the notch (~5/16″+) and show up as
     * empty space to the right of the stats. Tiny fixed pad only.
     */
    @media (orientation: landscape) and (max-height: 600px) {
      .fit-stage,
      .fit-stage.fit-stage--fluid {
        padding: 0;
      }

      .app,
      html.pwa-standalone .app {
        display: grid !important;
        grid-template-columns: minmax(0, 1.35fr) minmax(200px, 1fr);
        grid-template-rows: auto auto auto auto minmax(0, 1fr);
        gap: 0.14rem 0.25rem;
        padding: 0 !important;
        align-content: stretch;
        align-items: stretch;
        /* Outer chrome clearance — +5px from edge */
        --land-chrome-out: calc(0.2rem + 5px);
      }

      /* Notch-left (default): camera | chrome */
      .app > .preview-wrap {
        grid-column: 1;
        grid-row: 1 / -1;
        flex: none;
        min-height: 0;
        height: 100%;
        align-self: stretch;
        border-radius: 0 10px 10px 0;
        border-left: none;
        margin: 0;
        /* Pull under the notch / island */
        margin-left: calc(-1 * env(safe-area-inset-left, 0px));
        width: calc(100% + env(safe-area-inset-left, 0px));
        max-width: none;
      }

      .app > header.top {
        grid-column: 2;
        grid-row: 1;
        min-height: 0;
        padding-top: max(0.12rem, env(safe-area-inset-top, 0px));
        padding-right: var(--land-chrome-out);
      }

      .app > .readouts {
        grid-column: 2;
        grid-row: 2;
        padding-right: var(--land-chrome-out);
      }

      .app > .spectrum-block {
        grid-column: 2;
        grid-row: 3;
        gap: 0.12rem;
        padding-right: var(--land-chrome-out);
      }

      .app > .hint {
        grid-column: 2;
        grid-row: 4;
        min-height: 0;
        font-size: 0.62rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding-right: var(--land-chrome-out);
      }

      .app > .controls {
        grid-column: 2;
        grid-row: 5;
        align-self: end;
        min-height: 0;
        overflow: auto;
        padding: 0.22rem;
        gap: 0.18rem;
        border-radius: 12px;
        margin-right: var(--land-chrome-out);
        margin-bottom: max(0.12rem, env(safe-area-inset-bottom, 0px));
        -webkit-overflow-scrolling: touch;
      }

      /* Flipped: notch on right → chrome | camera */
      html[data-land-notch="right"] .app {
        grid-template-columns: minmax(200px, 1fr) minmax(0, 1.35fr);
      }

      html[data-land-notch="right"] .app > .preview-wrap {
        grid-column: 2;
        border-radius: 10px 0 0 10px;
        border-left: 1px solid var(--border);
        border-right: none;
        margin: 0;
        margin-left: 0;
        margin-right: calc(-1 * env(safe-area-inset-right, 0px));
        width: calc(100% + env(safe-area-inset-right, 0px));
      }

      html[data-land-notch="right"] .app > header.top {
        grid-column: 1;
        padding-right: 0;
        padding-left: var(--land-chrome-out);
      }

      html[data-land-notch="right"] .app > .readouts,
      html[data-land-notch="right"] .app > .spectrum-block,
      html[data-land-notch="right"] .app > .hint {
        grid-column: 1;
        padding-right: 0;
        padding-left: var(--land-chrome-out);
      }

      html[data-land-notch="right"] .app > .controls {
        grid-column: 1;
        margin-right: 0;
        margin-left: var(--land-chrome-out);
      }

      .spectrum-track {
        height: 1.45rem;
      }

      .spectrum-track.vis {
        height: 1.95rem;
      }

      .row.slot-row .presets .btn {
        font-size: 0.55rem;
        padding-top: 0.24rem;
        padding-bottom: 0.24rem;
      }

      .btn {
        padding-top: 0.28rem;
        padding-bottom: 0.28rem;
      }
    }
  </style>
</head>
<body>
  <div class="fit-stage" id="fit-stage">
    <div class="app" id="app" role="application" aria-label="LightSlice spectrum band filter">
      <header class="top">
        <div class="brand">
          <h1>LightSlice</h1>
        </div>
      </header>

      <div class="readouts">
        <div class="stat">
          <div class="stat-label">Band color</div>
          <div class="stat-value swatch">
            <span class="swatch-chip" id="swatch-chip" aria-hidden="true"></span>
            <span id="color-name">Full</span>
          </div>
        </div>
        <div class="stat">
          <div class="stat-label">Center</div>
          <div class="stat-value" id="wave-readout">550 nm</div>
        </div>
        <div class="stat">
          <div class="stat-label">Band</div>
          <div class="stat-value" id="band-readout">700 – 400 nm</div>
        </div>
      </div>

      <div class="preview-wrap" id="preview-wrap" aria-label="Filtered camera view">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="view" aria-label="Band-filtered camera output"></canvas>
      </div>

      <div class="spectrum-block" id="spectrum-block">
        <div class="spectrum-row">
          <div class="spectrum-label">
            <span>Full EM spectrum</span>
            <strong id="em-context">Visible is a thin ribbon</strong>
          </div>
          <div class="spectrum-track em" id="em-track">
            <canvas id="em-canvas" aria-label="Full electromagnetic spectrum"></canvas>
          </div>
        </div>
        <div class="spectrum-row">
          <div class="spectrum-label">
            <span>Visible · edges resize · drag middle to slide</span>
            <strong id="vis-context">700 – 400 nm · full</strong>
          </div>
          <div class="spectrum-track vis" id="vis-track">
            <canvas id="vis-canvas" aria-label="Visible spectrum band selector"></canvas>
            <div id="vis-hit" role="slider" aria-label="Visible band" tabindex="0"></div>
          </div>
        </div>
      </div>

      <p class="hint" id="hint">
        Full live image · band acts like a <span class="hint-white">spectral filter</span>
      </p>

      <div class="controls" id="controls">
        <div class="row modes-presets primary-row">
          <div class="modes">
            <button type="button" class="btn btn-primary" id="start-btn" data-state="off">Start camera</button>
            <button type="button" class="btn btn-ghost" id="flip-btn" disabled title="Switch to front camera">Front</button>
            <button type="button" class="btn btn-ghost" id="btn-full" title="Full visible band 400–700 nm">Full</button>
          </div>
          <div class="presets" role="group" aria-label="Band presets ROYGBIV">
            <button type="button" class="btn btn-ghost" data-preset="red" title="~625–700 nm">R</button>
            <button type="button" class="btn btn-ghost" data-preset="orange" title="~590–630 nm">O</button>
            <button type="button" class="btn btn-ghost" data-preset="yellow" title="~560–595 nm">Y</button>
            <button type="button" class="btn btn-ghost" data-preset="green" title="~495–565 nm">G</button>
            <button type="button" class="btn btn-ghost" data-preset="blue" title="~450–495 nm">B</button>
            <button type="button" class="btn btn-ghost" data-preset="indigo" title="~420–450 nm">I</button>
            <button type="button" class="btn btn-ghost" data-preset="violet" title="~400–425 nm">V</button>
          </div>
        </div>
        <div class="row modes-presets vision-row">
          <div class="presets" role="group" aria-label="Animal vision approximations">
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="snake"
              title="Snake - dichromat · UV+blue + green-yellow · muted reds"
            >Snake</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="cat"
              title="Cat - dichromat · blue + green-yellow · muted reds"
            >Cat</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="bee"
              title="Bee - Simulated UV"
            >Bee</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="bat"
              title="Bat - night dichromat · UV+blue + green-yellow · dim"
            >Bat</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="bird"
              title="Bird - tetrachromat · UV+full color · richer than human"
            >Bird</button>
          </div>
        </div>
        <div class="row modes-presets slot-row" id="controls-slot">
          <div class="presets" role="group" aria-label="Color vision deficiency approximations">
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="deutan"
              title="Deuteranopia - green-weak · red≈green · reds stay brighter"
            >Deuteranopia</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="protan"
              title="Protanopia - red-weak · reds darker · red≈green"
            >Protanopia</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="tritan"
              title="Tritanopia - blue-yellow weak"
            >Tritanopia</button>
            <button
              type="button"
              class="btn btn-ghost"
              data-vision="mono"
              title="Monochromacy - achromat · grayscale"
            >Monochromacy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="fit-to-screen.js?v=51"></script>

    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
